<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="100%">
  <defs>
    <!-- Premium gold gradient -->
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE19B" />
      <stop offset="35%" stop-color="#DFBA73" />
      <stop offset="70%" stop-color="#C59D4E" />
      <stop offset="100%" stop-color="#916E2B" />
    </linearGradient>
    <!-- Import Pinyon Script web font inside the SVG -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Pinyon+Script&amp;display=swap');
      .logo-text {
        font-family: 'Pinyon Script', cursive;
        font-size: 86px;
        fill: url(#gold-gradient);
        text-anchor: middle;
        filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.15));
      }
    </style>
  </defs>
  <!-- Beautiful gold calligraphy logo -->
  <text x="200" y="82" class="logo-text">Lallettre</text>
</svg>
